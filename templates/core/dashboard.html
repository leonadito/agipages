{% extends "base.html" %}
{% block title %}Painel — {{ tenant.name }}{% endblock %}
{% block content %}
<div class="mx-auto max-w-3xl px-4 py-10">
    <h1 class="text-2xl font-semibold">Bem-vindo, {{ tenant.name }}</h1>
    <p class="mt-2 text-gray-600">Logado como {{ request.user.email }}.</p>
    <form method="post" action="{% url 'accounts:logout' %}" class="mt-6">
        {% csrf_token %}
        <button type="submit" class="rounded-md bg-gray-800 px-4 py-2 text-white hover:bg-gray-700">Sair</button>
    </form>
</div>
{% endblock %}
