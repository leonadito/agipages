<tr id="lead-row-{{ lead.pk }}">
    <td class="px-4 py-2 text-sm text-gray-500">{{ lead.created_at|date:"d/m/Y H:i" }}</td>
    <td class="px-4 py-2 text-sm"><a class="text-blue-600 underline" href="{% url 'leads:detail' lead.pk %}">{{ lead.name }}</a></td>
    <td class="px-4 py-2 text-sm">{{ lead.email }}</td>
    <td class="px-4 py-2 text-sm">{{ lead.phone }}</td>
    <td class="px-4 py-2 text-sm">{{ lead.city }}</td>
    <td class="px-4 py-2 text-sm">{{ lead.landing_page.title }}</td>
    <td class="px-4 py-2 text-sm">{{ lead.utm_source|default:"—" }}</td>
    <td class="px-4 py-2 text-sm">
        <form hx-post="{% url 'leads:update_status' lead.pk %}" hx-target="#lead-row-{{ lead.pk }}" hx-swap="outerHTML">
            {% csrf_token %}
            <select name="status" onchange="this.form.requestSubmit()" class="text-sm">
                {% for value, label in status_choices %}
                <option value="{{ value }}" {% if value == lead.status %}selected{% endif %}>{{ label }}</option>
                {% endfor %}
            </select>
        </form>
    </td>
</tr>
