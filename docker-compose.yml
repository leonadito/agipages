services:
  web:
    build: .
    env_file:
      - .env
    environment:
      DJANGO_SETTINGS_MODULE: config.settings.prod
      DATABASE_PATH: /data/db.sqlite3
    volumes:
      - sqlite_data:/data
      - media_data:/app/media
    ports:
      # Bound to localhost only — the host's nginx (managed outside this
      # compose file, same pattern as the other apps on this VPS) terminates
      # TLS and reverse-proxies here. Port must stay in sync with the
      # nginx site config's proxy_pass.
      - "127.0.0.1:8002:8000"
    restart: unless-stopped

volumes:
  # SQLite file and uploaded media both need to survive rebuilds/
  # redeploys — the container filesystem itself is ephemeral (PRD §9/§10).
  sqlite_data:
  media_data:
