# Static dynamic-config file (tracked in git, NOT regenerated). Defines
# the `web` service once — traefik/dynamic/tenants.yml (generated by
# tenants/traefik.py, gitignored) only adds routers that reference this
# same service by name, so it's never redefined in two places.
#
# TODO: substitua `meusaas.example.com` pelo domínio real da plataforma
# (o fallback usado por meusaas.com/<tenant-slug>/<pagina>/, dashboard,
# accounts e admin) antes de subir em produção.
http:
  routers:
    platform-websecure:
      rule: "Host(`meusaas.example.com`)"
      service: web
      entryPoints:
        - websecure
      tls:
        certResolver: letsencrypt
    platform-web:
      rule: "Host(`meusaas.example.com`)"
      service: web
      entryPoints:
        - web
  services:
    web:
      loadBalancer:
        servers:
          - url: "http://web:8000"
